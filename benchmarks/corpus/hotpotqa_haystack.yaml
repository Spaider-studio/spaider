    method widely used at school and at university levels, working with small quantities
    of chemical substances. While much of traditional chemistry teaching centers on
    multi-gramme preparations, milligrammes of substances are sufficient for microscale
    chemistry. In universities, modern and expensive lab glassware is used and modern
    methods for detection and characterization of the produced substances are very
    common. In schools and in many countries of the Southern hemisphere, small-scale
    working takes place with low-cost and even no-cost material. There has always
    been a place for small-scale working in qualitative analysis, but the new developments
    can encompass much of chemistry a student is likely to meet.'

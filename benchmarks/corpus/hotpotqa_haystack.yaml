    City metropolitan area: the Edwards Campus in Overland Park, and the university''s
    medical school and hospital in Kansas City.  There are also educational and research
    sites in Parsons, Topeka, Garden City, Hays, and Leavenworth, and branches of
    the medical school in Wichita and Salina.  The university is one of the 62 members
    of the Association of American Universities.'

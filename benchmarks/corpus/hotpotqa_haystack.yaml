  text: '[Wikipedia: The Hork-Bajir Chronicles] The Hork-Bajir Chronicles is the second
    companion book to the "Animorphs" series, written by K. A. Applegate.  With respect
    to continuity within the series, it takes place before book #23, "The Pretender",
    although the events told in the story occur between the time of "The Ellimist
    Chronicles" and "The Andalite Chronicles".  The book is introduced by Tobias,
    who flies to the valley of the free Hork-Bajir, where Jara Hamee tells him the
    story of how the Yeerks enslaved the Hork-Bajir, and how Aldrea, an Andalite,
    and her companion, Dak Hamee, a Hork-Bajir, tried to save their world from the
    invasion.  Jara Hamee''s story is narrated from the points of view of Aldrea,
    Dak Hamee, and Esplin 9466, alternating in similar fashion to the "Megamorphs"
    books.'
  source: hotpotqa:5a85ea095542994775f606a8#The Hork-Bajir Chronicles
- date: '2026-04-29'
  type: WIKIPEDIA
  text: '[Wikipedia: Animorphs] Animorphs is a science fantasy series of young adult

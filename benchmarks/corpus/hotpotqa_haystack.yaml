  text: '[Wikipedia: Roy Croft] Roy Croft is a poet frequently given credit for writing
    a poem titled "Love" and beginning "I love you not only for what you are, but
    for what I am when I am with you.". The poem, which is commonly used in wedding
    speeches and readings is quoted frequently. It was included in a 1936 anthology
    entitled "Best Loved Poems of American People", edited by a Hazel Felleman, and
    published by Doubleday (ISBN  ) and appears without further attribution in "The
    Family Book of Best Loved Poems", edited by David L. George and published in 1952
    by Doubleday & Company, Inc., then of Garden City, New York. German translations
    of the poem circulate with the title "Ich liebe Dich" ("I Love You") but are (wrongly)
    credited to the Austrian poet Erich Fried. The translation(s) led to the speculation
    that the poem was just a translation of Erich Fried''s work and Roy Croft was
    a pseudonym used by a translator who wanted to keep all royalties from publication
    (rather than sharing them with Fried''s estate) or who simply did not want to
    go through the trouble of obtaining a license from a foreign entity. Taking into
    account that the poem was already published in 1936 (where Erich Fried was only
    15) it seems very unlikely that Erich Fried could be the author.'

  text: '[Wikipedia: Grand Sky] Grand Sky is an UAS (unmanned aerial systems)-specific
    business and aviation park located at Grand Forks Air Force Base near Grand Forks,
    North Dakota. A groundbreaking for the development was held in September 2015,

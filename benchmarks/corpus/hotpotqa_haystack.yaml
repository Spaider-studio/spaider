  text: '[Wikipedia: Allophone (Quebec)] In Quebec, an allophone is a resident, usually
    an immigrant, whose mother tongue or home language is neither French nor English.
    The term can also be sometimes used in other parts of Canada. The term parallels
    "Anglophone" (English-speaker), and "Francophone", which designate people whose
    mother tongues are English and French, respectively. Native speakers of aboriginal
    languages are generally not treated as allophones.'

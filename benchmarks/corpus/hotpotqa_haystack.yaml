  text: '[Wikipedia: Gates v. Collier] Gates v. Collier, 501 F.2d 1291 (5th Cir. 1974),
    was a landmark case decided in U.S. federal court that brought an end to the Trusty
    system and the flagrant inmate abuse that accompanied it at Mississippi State
    Penitentiary (Parchman) in Sunflower County, Mississippi. It was the first case
    in a body of law developed in the Fifth Circuit Court of Appeals holding that
    a variety of forms of corporal punishment against prisoners constituted cruel
    and unusual punishment and a violation of Eighth Amendment rights. This case was
    also the first broad-scale intervention by a court in the supervision of prison
    practices.'
  source: hotpotqa-distractor:5ae0a74e554299603e41842f#Gates v. Collier

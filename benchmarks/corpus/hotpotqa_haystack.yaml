  text: '[Wikipedia: Clear Lake Site] Clear Lake Site is an archaeological site located
    in Sand Ridge State Park 6.5 mi from Manito, Illinois. The site was occupied for
    the majority of the period from 500 B.C. to 1500 A.D.; cultures which have occupied
    the site include the Early Woodland, Havana Hopewell, and Mississippian. The site
    consists of a village area and two burial mounds. University of Chicago archaeologists
    conducted the first excavations at the site in 1932. Significant further excavations
    were conducted by George and Ethel Schoenbeck of the Peoria Academy of Science;
    the couple recovered 24,000 pottery shards from the site which represent every
    pottery type found in Central Illinois. The Illinois State Museum, which received
    all artifacts recovered by the Schoenbecks, conducted its own excavations at the
    site in the 1950s.'

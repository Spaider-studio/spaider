  text: '[Wikipedia: I''m Just a Singer (In a Rock and Roll Band)] "I''m Just a Singer
    (In a Rock and Roll Band)" is a 1973 hit single by the English progressive rock
    band The Moody Blues. It was first released in 1972 as the final track on the
    album "Seventh Sojourn". "I''m Just a Singer (In a Rock and Roll Band)" was later
    released as a single in 1973, with "For My Lady" on the B-side. It was the second

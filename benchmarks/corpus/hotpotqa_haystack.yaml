    intellectual foundation of the "Heller" decision. He has written many books and
    articles on the topic of gun control, some of which have been cited in Supreme
    Court opinions ("Heller", "McDonald", "Printz v. United States"). He has testified
    before congress on multiple occasions. Halbrook’s most important scholarly contribution,

_format_version: "3.0"
_transform: true

services:
  - name: spaider-backend
    url: http://backend-api:8000
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: api-route
        paths:
          - "/api"
        strip_path: false
        preserve_host: false
        protocols:
          - http
          - https
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
          exposed_headers:
            - X-Auth-Token
          credentials: false
          max_age: 3600
      - name: request-size-limiting
        config:
          allowed_payload_size: 10

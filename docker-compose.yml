services:
  neo4j:
    image: neo4j:5.23-community
    container_name: spaider-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-spaider-dev-2024}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: spaider-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: spaider-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      # Deterministic topic configuration
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: spaider-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: spaider-postgres
    ports:
      - "5432:5432"
    environment:
      # Dev defaults for a localhost stack. Override via .env (or shell env) for
      # any non-local deployment — never run these defaults on an exposed host.
      POSTGRES_USER: ${POSTGRES_USER:-spaider}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spaider}
      POSTGRES_DB: ${POSTGRES_DB:-spaider}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spaider -d spaider"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: spaider-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-spaider-dev-2024}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spaider-backend-api
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-topic-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-spaider-dev-2024}
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-spaider}:${POSTGRES_PASSWORD:-spaider}@postgres:5432/${POSTGRES_DB:-spaider}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    # JSON-file driver with rotation so any log aggregator (Loki/Vector/Fluent
    # Bit) can ingest the structured backend logs without losing history.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    # Intentionally NO ``container_name``. With an explicit
    # name, ``docker compose up --scale backend-worker=N`` fails because
    # Docker can't create N containers all named the same thing. Without
    # it Compose auto-names replicas ``spaider-backend-worker-1..N`` and
    # scaling works. Only useful for the async Kafka ingest path
    # (POST /api/v1/ingest); the sync MCP path bypasses Kafka entirely.
    # Kafka topics ship with 3 partitions (KAFKA_NUM_PARTITIONS=3 above),
    # so scale beyond 3 has diminishing returns until partition count is
    # also raised.
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-topic-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-spaider}:${POSTGRES_PASSWORD:-spaider}@postgres:5432/${POSTGRES_DB:-spaider}
    command: ["python", "-m", "app.worker"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_API_URL: "http://kong:8000/api"
    container_name: spaider-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend-api:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      BACKEND_API_URL: "http://kong:8000/api"
      BACKEND_HEALTH_URL: "http://spaider-backend-api:8000"
      NEXT_PUBLIC_API_URL: "http://localhost:8080/api"
    restart: unless-stopped

  kong:
    image: kong:3.7
    container_name: spaider-kong
    ports:
      - "8080:8000"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./gateway/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      backend-api:
        condition: service_healthy
    # `kong health` is the canonical readiness probe — verifies the nginx
    # master + worker processes are up. The image ships with no wget/curl,
    # so `kong health` is what works reliably across versions.
    healthcheck:
      test: ["CMD-SHELL", "kong health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  kafka-topic-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: spaider-kafka-topic-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./scripts/kafka-topic-init.sh:/kafka-topic-init.sh:ro
    command: ["bash", "/kafka-topic-init.sh"]
    restart: on-failure

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  clickhouse_data:
  postgres_data:
